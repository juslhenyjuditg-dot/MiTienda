<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medicampus</title>

<style>

/* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  overflow:hidden;
  background:
  linear-gradient(135deg,#050816,#090018,#130022);
  color:white;
  height:100vh;
}

/* ================= FONDO ================= */
.bg{
  position:absolute;
  inset:0;

  background:
  radial-gradient(circle at 20% 20%, rgba(255,0,140,.18), transparent 30%),
  radial-gradient(circle at 80% 30%, rgba(0,255,255,.12), transparent 30%),
  radial-gradient(circle at 50% 80%, rgba(140,0,255,.15), transparent 30%);

  z-index:0;
}

/* ================= PARTICULAS ================= */
.particle{
  position:absolute;
  width:4px;
  height:4px;
  border-radius:50%;
  background:#ff4fd8;
  opacity:.5;
  animation:float 8s linear infinite;
}

@keyframes float{
  from{
    transform:translateY(100vh);
  }

  to{
    transform:translateY(-100px);
  }
}

/* ================= NAV ================= */
.nav{
  position:relative;
  z-index:10;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:25px 60px;
}

.logo{
  font-size:42px;
  font-weight:bold;

  background:linear-gradient(90deg,#ff4fd8,#7d7dff,#00f0ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  letter-spacing:2px;
}

.menu{
  display:flex;
  gap:30px;
}

.menu a{
  color:white;
  text-decoration:none;
  opacity:.8;
  transition:.3s;
}

.menu a:hover{
  color:#ff4fd8;
}

/* ================= HERO ================= */
.hero{
  position:relative;
  z-index:10;

  height:80vh;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:0 80px;
}

/* ================= TEXTO ================= */
.hero-text{
  max-width:650px;
}

.hero-text h1{
  font-size:110px;
  line-height:0.95;
}

.hero-text span{

  background:
  linear-gradient(90deg,#ff4fd8,#ff9de6);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
  0 0 30px rgba(255,0,140,.5);
}

.hero-text p{

  margin-top:30px;

  font-size:22px;

  opacity:.8;

  line-height:1.7;
}

/* ================= BOTON ================= */
.hero-btn{

  margin-top:35px;

  padding:18px 40px;

  border:none;
  border-radius:18px;

  background:
  linear-gradient(90deg,#ff4fd8,#ff7ce8);

  color:white;

  font-size:18px;
  font-weight:bold;

  cursor:pointer;

  transition:.3s;

  box-shadow:
  0 0 30px rgba(255,0,140,.35);

}

.hero-btn:hover{

  transform:
  translateY(-5px)
  scale(1.03);

}

/* ================= VISUAL DERECHO ================= */
.visual{

  position:relative;

  width:420px;
  height:420px;

  display:flex;
  justify-content:center;
  align-items:center;

}

/* ================= TARJETA 3D ================= */
.card-3d{

  width:320px;
  height:380px;

  border-radius:35px;

  background:
  linear-gradient(145deg,
  rgba(255,255,255,.08),
  rgba(255,255,255,.02));

  backdrop-filter:blur(20px);

  border:
  1px solid rgba(255,255,255,.1);

  box-shadow:
  0 0 60px rgba(255,0,140,.25);

  transform:
  rotate(-10deg);

  overflow:hidden;

  position:relative;

}

/* ================= BRILLO ================= */
.card-3d::before{

  content:"";

  position:absolute;

  width:180px;
  height:500px;

  background:
  rgba(255,255,255,.12);

  transform:
  rotate(25deg);

  left:-100px;
  top:-80px;

}

/* ================= PRODUCTOS FALSOS ================= */
.mock-products{

  padding:30px;

  display:grid;

  grid-template-columns:
  repeat(2,1fr);

  gap:20px;

}

.mock-box{

  height:110px;

  border-radius:20px;

  background:
  linear-gradient(145deg,
  rgba(255,255,255,.12),
  rgba(255,255,255,.04));

  border:
  1px solid rgba(255,255,255,.08);

}

/* ================= TEXTO CARD ================= */
.mock-title{

  padding:25px;

  font-size:22px;
  font-weight:bold;

  color:#ff9de6;

}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){

  body{
    overflow:auto;
  }

  .hero{
    flex-direction:column;
    justify-content:center;
    text-align:center;

    padding:40px 20px;

    gap:50px;
  }

  .hero-text h1{
    font-size:65px;
  }

  .hero-text p{
    font-size:18px;
  }

  .logo{
    font-size:32px;
  }

  .nav{
    flex-direction:column;
    gap:20px;
  }

  .visual{
    width:100%;
  }

}

</style>
</head>

<body>

<!-- ================= FONDO ================= -->
<div class="bg"></div>

<!-- ================= PARTICULAS ================= -->
<div class="particle" style="left:10%;animation-duration:9s;"></div>
<div class="particle" style="left:20%;animation-duration:7s;"></div>
<div class="particle" style="left:35%;animation-duration:11s;"></div>
<div class="particle" style="left:50%;animation-duration:6s;"></div>
<div class="particle" style="left:65%;animation-duration:10s;"></div>
<div class="particle" style="left:80%;animation-duration:8s;"></div>

<!-- ================= NAV ================= -->
<div class="nav">

  <div class="logo">
    Medicampus
  </div>

  <div class="menu">

    <a href="productos.html">
      Productos
    </a>

    <a href="subir.html">
      Subir
    </a>

    <a href="nosotros.html">
      Nosotros
    </a>

  </div>

</div>

<!-- ================= HERO ================= -->
<section class="hero">

  <div class="hero-text">

    <h1>
      TU TIENDA
      <br>
      <span>ONLINE</span>
    </h1>

    <p>
      Diseño moderno, productos organizados y una experiencia
      visual futurista para tu emprendimiento digital.
    </p>

    <button class="hero-btn">
      Explorar
    </button>

  </div>

  <!-- ================= VISUAL ================= -->
  <div class="visual">

    <div class="card-3d">

      <div class="mock-title">
        Medicampus Store
      </div>

      <div class="mock-products">

        <div class="mock-box"></div>
        <div class="mock-box"></div>
        <div class="mock-box"></div>
        <div class="mock-box"></div>

      </div>

    </div>

  </div>

</section>

</body>
</html>
